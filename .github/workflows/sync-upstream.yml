name: Sync Upstream

on:
  schedule:
    # GitHub Actions cron uses UTC. These map to Asia/Shanghai 06:00 and 20:00.
    - cron: '0 22 * * *'
    - cron: '0 12 * * *'
  workflow_dispatch:
    inputs:
      upstream_branch:
        description: 'Upstream branch to sync'
        required: false
        default: 'main'
        type: string
      target_branch:
        description: 'Target branch to update'
        required: false
        default: 'main'
        type: string

permissions:
  contents: write

concurrency:
  group: sync-upstream-${{ github.event.inputs.target_branch || github.event.repository.default_branch }}
  cancel-in-progress: false

jobs:
  sync:
    name: Sync from upstream
    runs-on: ubuntu-latest

    steps:
      - name: Resolve branches
        id: branches
        run: |
          TARGET_BRANCH="${{ github.event.inputs.target_branch || github.event.repository.default_branch }}"
          UPSTREAM_BRANCH="${{ github.event.inputs.upstream_branch || 'main' }}"
          echo "target=${TARGET_BRANCH}" >> "$GITHUB_OUTPUT"
          echo "upstream=${UPSTREAM_BRANCH}" >> "$GITHUB_OUTPUT"

      - name: Checkout target branch
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.branches.outputs.target }}
          fetch-depth: 0
          token: ${{ secrets.SYNC_TOKEN || github.token }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Fetch upstream
        run: |
          git remote add upstream https://github.com/QuantumNous/new-api.git
          git fetch upstream "${{ steps.branches.outputs.upstream }}"

      - name: Merge upstream
        run: |
          git checkout "${{ steps.branches.outputs.target }}"
          git merge --no-edit "upstream/${{ steps.branches.outputs.upstream }}"

      - name: Push target branch
        run: git push origin "HEAD:${{ steps.branches.outputs.target }}"
